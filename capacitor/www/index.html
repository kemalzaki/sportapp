<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KawanKeringat</title>
<style>
  html,body{margin:0;height:100%;background:#0f172a;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;display:flex;align-items:center;justify-content:center;text-align:center}
  .wrap{padding:24px}
  .logo{width:96px;height:96px;border-radius:24px;background:linear-gradient(135deg,#0ea5e9,#6366f1);display:inline-flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:24px;box-shadow:0 20px 50px -10px rgba(14,165,233,.5)}
  .spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#0ea5e9;border-radius:50%;animation:s 1s linear infinite;margin:18px auto 0}
  @keyframes s{to{transform:rotate(360deg)}}
  small{opacity:.6;display:block;margin-top:18px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">⚡</div>
    <h2 style="margin:0;font-weight:800">KawanKeringat</h2>
    <div class="spin"></div>
    <small>Menghubungkan…</small>
  </div>
  <!--
    Catatan: file ini hanya fallback. Karena `server.url` diset di
    capacitor.config.ts, WebView akan otomatis memuat hosting PHP. Halaman
    ini muncul hanya jika koneksi gagal sebelum redirect terjadi.
  -->
  <script>
    setTimeout(function(){ location.href = 'https://sportapp-rumd.onrender.com/'; }, 800);
  </script>
</body>
</html>
